<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="环保现场执行图谱默认入口:对外展示首页优先,主任演示和内部工作区保留直达参数。" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d9468'/%3E%3Crect x='9' y='9' width='14' height='14' rx='3' fill='none' stroke='%23060f0b' stroke-width='3' transform='rotate(45 16 16)'/%3E%3C/svg%3E" />
    <title>环保现场执行图谱</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const shouldOpenApp =
          params.has("director") ||
          params.has("workspace") ||
          params.has("view");
        const target = shouldOpenApp ? "app.html" : "landing.html";
        window.location.replace(`./${target}${window.location.search}${window.location.hash}`);
      })();
    </script>
  </head>
  <body>
    <p>正在进入环保现场执行图谱...</p>
    <p><a href="./landing.html">进入展示首页</a> · <a href="./app.html">进入图谱驾驶舱</a></p>
  </body>
</html>
