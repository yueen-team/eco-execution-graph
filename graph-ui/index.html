<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="环保现场执行图谱默认入口:对外展示首页优先,主任演示和内部工作区保留直达参数。" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>环保现场执行图谱</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const shouldOpenApp =
          params.has("director") ||
          params.has("workspace") ||
          params.has("view");
        const target = shouldOpenApp ? "app.html" : "landing.html";
        const base = "%BASE_URL%";
        const appBase = base.endsWith("/") ? base : `${base}/`;
        window.location.replace(`${appBase}${target}${window.location.search}${window.location.hash}`);
      })();
    </script>
  </head>
  <body>
    <p>正在进入环保现场执行图谱...</p>
    <p><a href="%BASE_URL%landing.html">进入展示首页</a> · <a href="%BASE_URL%app.html">进入图谱驾驶舱</a></p>
  </body>
</html>
