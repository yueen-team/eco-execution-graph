<!doctype html>
<html lang="zh-CN">

    <main class="login-shell">
      <section class="login-card" aria-label="内部登录">
        <svg class="brand-logo" viewBox="11 11 65 67" aria-hidden="true">
          <path d="M51 14 L44 23 L38 34 L40 35 L49 20 L51 19 L55 23 L66 40 L70 50 L70 59 L67 65 L62 70 L56 73 L47 73 L46 75 L56 75 L63 72 L70 65 L72 60 L71 46 L66 36 Z" fill="#0d9468"/>
          <path d="M16 32 L15 33 L15 48 L18 55 L25 62 L35 65 L39 70 L38 64 L35 57 L31 51 L23 43 L25 42 L31 46 L38 53 L43 61 L44 59 L44 48 L43 46 L35 38 Z" fill="#2ee6a8"/>
          <path d="M65 53 L63 53 L61 60 L54 66 L55 67 L59 66 L62 63 L65 58 Z" fill="#7cf0be"/>

        <h1>悦恩环保管家现场执行图谱</h1>
        <p class="login-sub">内部工作区:全量视图与现场经验入图审核台</p>

        <button id="wecomLogin" class="btn-primary login-wecom">

          企业微信扫码登录
        </button>
        <p id="wecomHint" class="login-hint">仅限本企业成员;不提供手机号或邮箱注册。</p>

        <details class="login-token">
          <summary>使用内部访问令牌(应急通道)</summary>
          <div class="login-token-body">
            <input id="tokenInput" type="password" placeholder="粘贴内部访问令牌" autocomplete="off" />
            <button id="tokenLogin" class="btn-ghost">验证并进入</button>
          </div>
        </details>

        <p id="loginNotice" class="login-notice" hidden></p>
        <p class="login-foot"><a href="./landing.html">← 返回首页</a> · 共有演示包无需登录</p>
      </section>
    </main>
    <script type="module" src="/src/login.js"></script>
